name: Reconcile Root Lockfile

on:
  push:
    branches:
      - imperatus-build-week-v117
    paths:
      - ".github/workflows/reconcile-root-lockfile.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reconcile:
    name: Reconcile package-lock.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: imperatus-build-week-v117

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Reconcile root lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify clean install
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Commit reviewed lockfile candidate
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "No lockfile changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Reconcile root npm lockfile"
          git push origin HEAD:imperatus-build-week-v117
