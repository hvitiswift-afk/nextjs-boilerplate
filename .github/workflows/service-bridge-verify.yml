name: Service Bridge Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "app/service-bridge/**"
      - "app/api/service-bridge/**"
      - "lib/service-bridge*.ts"
      - "scripts/check-service-bridge-contract.mjs"
      - "scripts/smoke-service-bridge-*.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/service-bridge-verify.yml"
  push:
    branches: [main]
    paths:
      - "app/service-bridge/**"
      - "app/api/service-bridge/**"
      - "lib/service-bridge*.ts"
      - "scripts/check-service-bridge-contract.mjs"
      - "scripts/smoke-service-bridge-*.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/service-bridge-verify.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: service-bridge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract and boundary checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify Service Bridge contract
        run: npm run service-bridge:check

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js application
        run: npm run build
      - name: Archive production build
        uses: actions/upload-artifact@v4
        with:
          name: service-bridge-next-build-${{ github.sha }}
          path: .next
          include-hidden-files: true
          retention-days: 3

  smoke:
    name: Live API, recovery, persistence, rollback, lifecycle, and projection tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: service-bridge-next-build-${{ github.sha }}
          path: .next
      - name: Start production server
        run: |
          nohup npm start > service-bridge-server.log 2>&1 &
          echo $! > service-bridge-server.pid
      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3000/api/service-bridge/health > /dev/null; then
              echo "Service Bridge is ready"
              exit 0
            fi
            sleep 2
          done
          cat service-bridge-server.log
          exit 1
      - name: Run end-to-end API smoke tests
        run: npm run service-bridge:smoke | tee service-bridge-smoke.txt
      - name: Run recovery smoke tests
        run: npm run service-bridge:smoke:recovery | tee service-bridge-recovery-smoke.txt
      - name: Run persistence smoke tests
        run: npm run service-bridge:smoke:persistence | tee service-bridge-persistence-smoke.txt
      - name: Run rollback smoke tests
        run: npm run service-bridge:smoke:rollback | tee service-bridge-rollback-smoke.txt
      - name: Run lifecycle smoke tests
        run: npm run service-bridge:smoke:lifecycle | tee service-bridge-lifecycle-smoke.txt
      - name: Run lifecycle projection smoke tests
        run: npm run service-bridge:smoke:lifecycle-projection | tee service-bridge-lifecycle-projection-smoke.txt
      - name: Write verification receipt
        run: |
          mkdir -p artifacts
          cat > artifacts/service-bridge-verification.txt <<EOF
          JP / Hviti Service Bridge Verification Receipt
          Commit: $GITHUB_SHA
          Ref: $GITHUB_REF
          Run: $GITHUB_RUN_ID
          Contract: PASS
          Production build: PASS
          Live server health: PASS
          API smoke suite: PASS
          Recovery smoke suite: PASS
          Persistence smoke suite: PASS
          Rollback smoke suite: PASS
          Lifecycle smoke suite: PASS
          Lifecycle projection smoke suite: PASS
          Automatic mutation: DISALLOWED
          Automatic rollback: DISALLOWED
          Projection mutation: DISALLOWED
          Silent overwrite: DISALLOWED
          External persistence: DISALLOWED
          External rollback: DISALLOWED
          Trusted timestamp claim: NONE
          External-action boundary: PRESERVED
          Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          cp service-bridge-smoke.txt artifacts/
          cp service-bridge-recovery-smoke.txt artifacts/
          cp service-bridge-persistence-smoke.txt artifacts/
          cp service-bridge-rollback-smoke.txt artifacts/
          cp service-bridge-lifecycle-smoke.txt artifacts/
          cp service-bridge-lifecycle-projection-smoke.txt artifacts/
          cp service-bridge-server.log artifacts/
      - name: Stop production server
        if: always()
        run: |
          if [ -f service-bridge-server.pid ]; then
            kill "$(cat service-bridge-server.pid)" || true
          fi
      - name: Upload verification receipt and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-bridge-verification-${{ github.sha }}
          path: artifacts
          retention-days: 30
