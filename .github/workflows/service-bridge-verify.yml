name: Service Bridge Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "app/service-bridge/**"
      - "app/api/service-bridge/**"
      - "lib/service-bridge*.ts"
      - "scripts/check-service-bridge-*.mjs"
      - "scripts/smoke-service-bridge-*.mjs"
      - "scripts/run-service-bridge-smoke-all.mjs"
      - "scripts/verify-service-bridge-deployment.mjs"
      - "netlify.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/service-bridge-verify.yml"
  push:
    branches: [main]
    paths:
      - "app/service-bridge/**"
      - "app/api/service-bridge/**"
      - "lib/service-bridge*.ts"
      - "scripts/check-service-bridge-*.mjs"
      - "scripts/smoke-service-bridge-*.mjs"
      - "scripts/run-service-bridge-smoke-all.mjs"
      - "scripts/verify-service-bridge-deployment.mjs"
      - "netlify.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/service-bridge-verify.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: service-bridge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract catalog v19 and runtime checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify all Service Bridge contracts
        run: npm run service-bridge:check:all
      - name: Verify v19 contract catalog endpoint source
        run: test -f app/api/service-bridge/contracts/route.ts

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js application
        run: npm run build
      - name: Archive production build
        uses: actions/upload-artifact@v4
        with:
          name: service-bridge-next-build-${{ github.sha }}
          path: .next
          include-hidden-files: true
          retention-days: 3

  smoke:
    name: Unified live Service Bridge verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: service-bridge-next-build-${{ github.sha }}
          path: .next
      - name: Start production server
        run: |
          nohup npm start > service-bridge-server.log 2>&1 &
          echo $! > service-bridge-server.pid
      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3000/api/service-bridge/health > /dev/null; then
              echo "Service Bridge is ready"
              exit 0
            fi
            sleep 2
          done
          cat service-bridge-server.log
          exit 1
      - name: Run unified Service Bridge smoke suite
        run: npm run service-bridge:smoke:all | tee service-bridge-unified-smoke.txt
      - name: Verify contract catalog live
        run: curl --fail --silent http://127.0.0.1:3000/api/service-bridge/contracts > artifacts-contracts.json
      - name: Write verification receipt
        run: |
          mkdir -p artifacts
          cat > artifacts/service-bridge-verification.txt <<EOF
          JP / Hviti Service Bridge Verification Receipt
          Commit: $GITHUB_SHA
          Ref: $GITHUB_REF
          Run: $GITHUB_RUN_ID
          Contract catalog version: 19
          Architecture contract: PASS
          Runtime metadata contract: PASS
          CI contract: PASS
          Production build: PASS
          Live server health: PASS
          Contract catalog live: PASS
          Unified smoke runner: PASS
          Smoke suites completed: 8/8
          Automatic deployment: DISALLOWED
          Public deployment verified: NO
          External-action boundary: PRESERVED
          Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          cp service-bridge-unified-smoke.txt artifacts/
          cp service-bridge-server.log artifacts/
          cp artifacts-contracts.json artifacts/
      - name: Stop production server
        if: always()
        run: |
          if [ -f service-bridge-server.pid ]; then
            kill "$(cat service-bridge-server.pid)" || true
          fi
      - name: Upload verification receipt and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-bridge-verification-${{ github.sha }}
          path: artifacts
          retention-days: 30
