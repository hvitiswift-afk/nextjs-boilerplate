name: Imperatus Review

on:
  pull_request:
    branches:
      - main
    paths:
      - "projects/imperatus/**"
      - ".github/workflows/imperatus-review.yml"
  push:
    branches:
      - main
    paths:
      - "projects/imperatus/**"
      - ".github/workflows/imperatus-review.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify simulated-only MCP project
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/imperatus

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: projects/imperatus/package.json

      - name: Install project dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check and verify review boundaries
        run: npm run verify
