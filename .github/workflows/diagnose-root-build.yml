name: Diagnose Root Build

on:
  push:
    branches:
      - imperatus-build-week-v117
    paths:
      - ".github/workflows/diagnose-root-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: imperatus-build-week-v117

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Capture sanitized build failure
        shell: bash
        run: |
          set +e
          npm run build > build-full.log 2>&1
          code=$?
          {
            echo "# Root Build Diagnostic"
            echo
            echo "Exit code: $code"
            echo
            echo '```text'
            grep -E "(Error:|error TS|Failed to compile|Build failed|Module not found|Type error|ReferenceError|SyntaxError|⨯|ELIFECYCLE|ERR!)" build-full.log | tail -n 120 | sed -E 's#(https?://)[^ ]+#\1[redacted-url]#g' | sed -E 's#([A-Za-z0-9_]*(TOKEN|SECRET|KEY|PASSWORD)[A-Za-z0-9_]*)=[^ ]+#\1=[redacted]#g'
            echo '```'
          } > docs/ROOT-BUILD-DIAGNOSTIC.md
          rm -f build-full.log
          exit 0

      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ROOT-BUILD-DIAGNOSTIC.md
          git commit -m "Capture root build diagnostic" || exit 0
          git push origin HEAD:imperatus-build-week-v117
