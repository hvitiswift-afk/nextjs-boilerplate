name: GRIPLOOM Checks

on:
  pull_request:
    paths:
      - "docs/GRIPLOOM-*.md"
      - "examples/griploom-*.json"
      - "scripts/check-griploom-*.mjs"
      - "package.json"
      - ".github/workflows/griploom-checks.yml"
  push:
    branches:
      - main
    paths:
      - "docs/GRIPLOOM-*.md"
      - "examples/griploom-*.json"
      - "scripts/check-griploom-*.mjs"
      - "package.json"
      - ".github/workflows/griploom-checks.yml"

jobs:
  griploom-checks:
    name: GRIPLOOM sample integrity gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run GRIPLOOM ID and screenplay checks
        run: npm run griploom:checks
