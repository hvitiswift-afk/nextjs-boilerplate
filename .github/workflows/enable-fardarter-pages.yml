name: Enable Fardarter GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable and configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ secrets.GH_ADMIN_TOKEN }}

      - name: Record enablement receipt
        run: |
          echo "base_url=${{ steps.pages.outputs.base_url }}"
          echo "origin=${{ steps.pages.outputs.origin }}"
          echo "base_path=${{ steps.pages.outputs.base_path }}"
          echo "Pages is configured. Run Publish Fardarter Startup Site next."
